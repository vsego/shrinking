name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: Run Ruff
        run: ruff check .
      - name: Run Pyright
        run: pyright
      - name: Run tests
        env:
          USE_INSTALLED_PACKAGE: "1"
        run: ./run_tests.sh

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: Build release artifacts
        run: python -m build --no-isolation
      - name: Check release metadata
        run: python -m twine check dist/*
      - name: Smoke-test built wheel
        run: |
          python -m venv /tmp/shrinking-wheel
          /tmp/shrinking-wheel/bin/python -m pip install --upgrade pip
          /tmp/shrinking-wheel/bin/python -m pip install dist/*.whl
          /tmp/shrinking-wheel/bin/python -c "import shrinking; import numpy as np; print(shrinking.bisection(np.array([[1.0, 1.2], [1.2, 1.0]]), np.identity(2)))"
      - name: Smoke-test built sdist
        run: |
          python -m venv /tmp/shrinking-sdist
          /tmp/shrinking-sdist/bin/python -m pip install --upgrade pip
          /tmp/shrinking-sdist/bin/python -m pip install dist/*.tar.gz
          /tmp/shrinking-sdist/bin/python -c "import shrinking; import numpy as np; print(shrinking.bisection(np.array([[1.0, 1.2], [1.2, 1.0]]), np.identity(2)))"
